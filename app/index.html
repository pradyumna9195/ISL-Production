<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language Recognition</title>
    <link rel="stylesheet" href="./static/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-hands"></i>
            <h1>Sign Language Recognition</h1>
        </div>
        <p class="tagline">Translate sign language to text in real time</p>
    </header>

    <main>
        <div class="container">
            <h1>Sign Language Recognition</h1>

            <div class="video-section">
                <div class="video-wrapper">
                    <video id="input-video" playsinline muted></video>
                    <canvas id="output-canvas"></canvas>
                </div>
                <p id="cameraState" class="camera-state">Camera is off</p>
            </div>

            <div class="recognition-section">
                <div class="sentence-container">
                    <h2>Recognized Signs:</h2>
                    <div id="sentence" class="sentence"></div>
                    <div id="status" class="status"></div>
                    <div id="confidence" class="status">Confidence: --</div>
                </div>

                <div class="controls">
                    <button id="startBtn" class="btn start">Start Recognition</button>
                    <button id="stopBtn" class="btn stop">Stop Recognition</button>
                    <button id="resetBtn" class="btn reset">Reset</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Sign Language Recognition System</p>
    </footer>

    <script>
        window.APP_CONFIG = {
            modelUrl: '/static/models/action_best_tfjs/model.json/model.json',
            apiBaseUrl: 'https://YOUR_BACKEND_URL_HERE',
            useBackendFallback: true
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
    <script src="./static/js/script.js"></script>
</body>
</html>
